# =============================================
# AiAgent Docker Compose 配置
# =============================================

services:
  # =========================================
  # AiAgent 应用
  # =========================================
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: aiagent-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=aiagent
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-aiagent_secret_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # LLM API Keys
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      # 存储配置
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-local}
      - LOCAL_STORAGE_PATH=/app/uploads
      # 其他配置
      - LOG_LEVEL=INFO
    volumes:
      - ../logs:/app/logs
      - ../uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - aiagent-network

  # =========================================
  # PostgreSQL 数据库
  # =========================================
  postgres:
    image: postgres:16-alpine
    container_name: aiagent-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=aiagent
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-aiagent_secret_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - aiagent-network

  # =========================================
  # Redis 缓存
  # =========================================
  redis:
    image: redis:7-alpine
    container_name: aiagent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aiagent-network

  # =========================================
  # Nginx 反向代理 (可选)
  # =========================================
  nginx:
    image: nginx:alpine
    container_name: aiagent-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - aiagent-network

# =============================================
# 网络
# =============================================
networks:
  aiagent-network:
    driver: bridge

# =============================================
# 卷
# =============================================
volumes:
  postgres_data:
  redis_data:
